<script>
/* ===== Utils (must be first) ===== */
function isoToday(){ return new Date().toISOString().slice(0,10); }
function isoOffset(iso,days){
  const d=new Date(iso);
  d.setDate(d.getDate()+days);
  return d.toISOString().slice(0,10);
}
function load(k,def){
  try { return JSON.parse(localStorage.getItem(k) || 'null') ?? def; }
  catch(e){ return def; }
}
function save(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
function ensureDay(iso){
  if(!days[iso]) days[iso]=[];
  return days[iso];
}
function fmtHumanDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString(undefined,{day:'2-digit',month:'2-digit',year:'numeric'});
}
function escapeHtml(s){
  return s.replace(/[&<>"']/g, m=>(
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]
  ));
}

/* ===== Local Storage Keys & Globals ===== */
const LS_KEY = 'tp_days_v6_1';
const LS_LAST_OPEN = 'tp_last_open';
const LS_LAST_CARRY_COUNT = 'tp_last_carry_count';
const LS_SYNC = 'tp_sync_code';

let days = load(LS_KEY, {});
const TODAY = isoToday();
let viewing = TODAY;

/* ===== Firebase Setup ===== */
/* ===== Firebase Setup (safe) ===== */
const firebaseConfig = {
  apiKey: "AIzaSyDXbxWT9viGCGDpPxlzp45QaBr3zUUn2UU",
  authDomain: "taskpulse-9a6ab.firebaseapp.com",
  databaseURL: "https://taskpulse-9a6ab-default-rtdb.firebaseio.com",
  projectId: "taskpulse-9a6ab",
  storageBucket: "taskpulse-9a6ab.firebasestorage.app",
  messagingSenderId: "92117591983",
  appId: "1:92117591983:web:dd1d73226dbb112c58f15a",
  measurementId: "G-SN3T2B2RMY"
};

let firebaseAvailable = false;

try{
  if (typeof firebase !== 'undefined' && firebase && firebase.initializeApp){
    firebase.initializeApp(firebaseConfig);
    firebaseAvailable = true;
  }
}catch(e){
  console.warn('Firebase init failed, running local-only.', e);
  firebaseAvailable = false;
}

const TP_UID = localStorage.getItem('tp_uid') || (() => {
  const v='u_'+Math.random().toString(36).slice(2,10);
  localStorage.setItem('tp_uid',v);
  return v;
})();

let syncRef = null;
let syncOff = null;
let writeTimer = null;

function isFirebaseReady(){
  return firebaseAvailable &&
         typeof firebase !== 'undefined' &&
         firebase.apps &&
         firebase.apps.length;
}

function setSyncBadge(text,kind=''){
  const el = document.getElementById('syncState');
  if(!el) return;
  el.textContent = text;
  el.className = 'badge ' + (kind || '');
}

function randomCode(len=6){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let out='';
  for(let i=0;i<len;i++){
    out += chars[Math.floor(Math.random()*chars.length)];
  }
  return out;
}

/* ===== Tabs ===== */
function showTab(id){
  document.querySelectorAll('.tab-pane').forEach(p=>{
    p.classList.toggle('active', p.id === id);
  });
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab === id);
  });
  if(id === 'histTab') renderHistory();
}

/* ===== TASKS ===== */
function addTask(){
  const input = document.getElementById('taskInput');
  const name  = input.value.trim();
  const prio  = document.getElementById('prioSelect').value;
  if(!name) return;

  const t = {
    id: 't_'+Math.random().toString(36).slice(2,8),
    name,
    prio,
    done:false,
    stars:0,
    createdAt:new Date().toISOString()
  };

  ensureDay(viewing).unshift(t);
  save(LS_KEY, days);

  input.value = '';
  renderAll();
  tpRenderDatalist('');
}

function toggleDone(dayKey,id,el){
  const t = ensureDay(dayKey).find(x=>x.id===id);
  if(!t) return;
  t.done = el.checked;
  t.timeCompleted = t.done ? new Date().toISOString() : '';
  save(LS_KEY,days);
  renderAll();
}

function setStars(dayKey,id,s){
  const t = ensureDay(dayKey).find(x=>x.id===id);
  if(!t) return;
  t.stars = s;
  save(LS_KEY,days);
  renderAll();
}

function editTask(dayKey,id){
  const t = ensureDay(dayKey).find(x=>x.id===id);
  if(!t) return;
  const name = prompt('Edit task', t.name);
  if(name===null) return;
  const prio = prompt('Priority (low/med/high)', t.prio) || t.prio;

  t.name = name.trim();
  t.prio = ['low','med','high'].includes(prio) ? prio : t.prio;

  save(LS_KEY,days);
  renderAll();
}

function delTask(dayKey,id){
  if(!confirm('Delete task?')) return;
  days[dayKey] = ensureDay(dayKey).filter(t=>t.id!==id);
  save(LS_KEY,days);
  renderAll();
}

function clearCompleted(){
  days[viewing] = ensureDay(viewing).filter(t=>!t.done);
  save(LS_KEY,days);
  renderAll();
}

function shiftDay(delta){
  const d = new Date(viewing);
  d.setDate(d.getDate()+delta);
  viewing = d.toISOString().slice(0,10);
  renderAll();
}

/* ===== MANUAL CARRY ===== */
function manualCarryOver(){
  const list = ensureDay(viewing);
  const incomplete = list.filter(t=>!t.done);
  if(!incomplete.length){
    alert('No incomplete tasks to carry.');
    return;
  }
  const tomorrow = isoOffset(viewing, +1);

  ensureDay(tomorrow).unshift(...incomplete.map(t=>({
    ...t,
    id:'t_'+Math.random().toString(36).slice(2,8),
    createdAt:new Date().toISOString()
  })));

  days[viewing] = list.filter(t=>t.done);
  save(LS_KEY,days);

  alert(`Carried ${incomplete.length} task(s) to ${fmtHumanDate(tomorrow)}.`);
  renderAll();
}

/* ===== AUTO CARRY (on new day) ===== */
function autoCarryForwardIfNewDay(){
  const last = localStorage.getItem(LS_LAST_OPEN);
  const today = isoToday();
  let carried = 0;

  if(last && last !== today){
    const prevIncomplete = ensureDay(last).filter(t=>!t.done);
    if(prevIncomplete.length){
      const dest = ensureDay(today);
      dest.unshift(...prevIncomplete.map(t=>({
        ...t,
        id:'t_'+Math.random().toString(36).slice(2,8),
        createdAt:new Date().toISOString()
      })));
      days[last] = ensureDay(last).filter(t=>t.done);
      carried = prevIncomplete.length;
      save(LS_KEY,days);
    }
  }
  localStorage.setItem(LS_LAST_OPEN, today);
  localStorage.setItem(LS_LAST_CARRY_COUNT, String(carried));
}

function showCarryBannerIfAny(){
  const bar = document.getElementById('carryWarn');
  if(!bar) return;
  const cnt = parseInt(localStorage.getItem(LS_LAST_CARRY_COUNT) || '0',10);
  if(cnt>0){
    bar.style.display = 'block';
    bar.textContent = `⚠️ ${cnt} incomplete task(s) were automatically carried over.`;
  }else{
    bar.style.display = 'none';
  }
}

/* ===== RENDER TASK LIST ===== */

/* ===== RENDER TASK LIST ===== */
function renderAll(){
  // Optional date labels
  const todayEl   = document.getElementById('todayLabel');
  const viewingEl = document.getElementById('viewingLabel');
  if (todayEl)   todayEl.textContent   = 'Today: '   + fmtHumanDate(TODAY);
  if (viewingEl) viewingEl.textContent = 'Viewing: ' + fmtHumanDate(viewing);

  const list = ensureDay(viewing);
  const ul   = document.getElementById('taskList');
  if (!ul) return; // no list container -> nothing to render, avoid crash

  ul.innerHTML = '';

  list.forEach(t=>{
    const li = document.createElement('li');
    li.className = 'task';

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = t.done;
    cb.onchange = e => toggleDone(viewing, t.id, e.target);

    const center = document.createElement('div');
    const prClass = t.prio === 'low' ? 'p-low' : t.prio === 'med' ? 'p-med' : 'p-high';
    center.innerHTML = `
      <div style="font-weight:600;${t.done?'text-decoration:line-through;opacity:.7':''}">
        ${escapeHtml(t.name)}
      </div>
      <div><span class="priority ${prClass}">${t.prio}</span></div>
    `;

    const stars = document.createElement('div');
    stars.className = 'stars';
    for(let s=1;s<=3;s++){
      const b=document.createElement('button');
      b.textContent='★';
      if(t.stars>=s) b.classList.add('on');
      b.onclick=()=>setStars(viewing,t.id, s===t.stars?0:s);
      stars.appendChild(b);
    }

    const act = document.createElement('div');
    act.className = 'actions';

    const eBtn=document.createElement('button');
    eBtn.textContent='✎';
    eBtn.onclick=()=>editTask(viewing,t.id);

    const dBtn=document.createElement('button');
    dBtn.textContent='×';
    dBtn.className='del';
    dBtn.onclick=()=>delTask(viewing,t.id);

    act.appendChild(eBtn);
    act.appendChild(dBtn);

    li.appendChild(cb);
    li.appendChild(center);
    li.appendChild(stars);
    li.appendChild(act);

    ul.appendChild(li);
  });

  const total = list.length;
  const done  = list.filter(t=>t.done).length;
  const pct   = total ? Math.round(done/total*100) : 0;

  const qsum  = list.filter(t=>t.done).reduce((a,b)=>a+(b.stars||0),0);
  const qPct  = done ? Math.round((qsum/(done*3))*100) : 0;

  const doneSummaryEl    = document.getElementById('doneSummary');
  const qualitySummaryEl = document.getElementById('qualitySummary');
  const kpiRow           = document.getElementById('kpiRow');

  if (doneSummaryEl){
    doneSummaryEl.textContent = `${done} / ${total} tasks done (${pct}%)`;
  }
  if (qualitySummaryEl){
    qualitySummaryEl.textContent = `Quality ${qPct}%`;
  }
  if (kpiRow && kpiRow.firstElementChild){
    kpiRow.firstElementChild.textContent =
      `${done} / ${total} done (${pct}%) · Quality ${qPct}%`;
  }
}

/* ===== HISTORY ===== */
function renderHistory(){
  const wrap = document.getElementById('histList');
  if(!wrap) return;

  const q   = document.getElementById('histSearch').value.trim().toLowerCase();
  const spanSel = document.getElementById('histSpan').value;

  let keys = Object.keys(days||{});
  if(spanSel !== 'all'){
    const span = parseInt(spanSel,10);
    const min = new Date();
    min.setDate(min.getDate()-span);
    keys = keys.filter(k=>new Date(k)>=min);
  }

  keys.sort((a,b)=>new Date(b)-new Date(a));

  if(q){
    keys = keys.filter(k=>{
      if(k.toLowerCase().includes(q)) return true;
      return (days[k]||[]).some(t=>(t.name||'').toLowerCase().includes(q));
    });
  }

  wrap.innerHTML = '';
  if(!keys.length){
    wrap.innerHTML = '<div class="muted">No history found.</div>';
    return;
  }

  keys.forEach(k=>{
    const arr   = days[k]||[];
    const total = arr.length;
    const done  = arr.filter(t=>t.done).length;
    const pct   = total ? Math.round(done/total*100) : 0;
    const qsum  = arr.filter(t=>t.done).reduce((a,b)=>a+(b.stars||0),0);
    const qPct  = done ? Math.round((qsum/(done*3))*100) : 0;

    const row  = document.createElement('div');
    row.className = 'hist-row';
    row.style.border='1px solid #262a3c';
    row.style.borderRadius='12px';
    row.style.padding='10px 12px';
    row.style.margin='6px 0';
    row.style.display='flex';
    row.style.justifyContent='space-between';
    row.style.alignItems='center';
    row.style.background='#101528';

    const left = document.createElement('div');
    left.innerHTML = `
      <div style="font-weight:700">${fmtHumanDate(k)}</div>
      <div class="meta" style="color:#9fb0d0;font-size:12px;margin-top:4px;">
        ${done}/${total} done • ${pct}% · Quality ${qPct}%
      </div>
    `;

    const right = document.createElement('div');
    const btn = document.createElement('button');
    btn.textContent='Open';
    btn.onclick=()=>{ viewing=k; showTab('tasksTab'); renderAll(); };
    right.appendChild(btn);

    row.appendChild(left);
    row.appendChild(right);
    wrap.appendChild(row);
  });
}



/* ===== BACKUP & RESTORE ===== */
(function(){
  window.tpDownloadBackup = function(){
    try{
      const dump = {};
      for(let i=0;i<localStorage.length;i++){
        const k = localStorage.key(i);
        if(/^tp_/.test(k)) dump[k]=localStorage.getItem(k);
      }
      const payload = {
        app:'taskpulse',
        version:'v6.1',
        exportedAt:new Date().toISOString(),
        dump
      };
      const blob = new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'taskpulse_backup.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      localStorage.setItem('tp_last_backup', new Date().toLocaleString());
      tpUpdateLastBackupLabel();
      setStatus('Backup downloaded.');
    }catch(e){
      console.error(e);
      setStatus('Backup failed.');
    }
  };

  const fi = document.getElementById('tpRestoreFile');
  if(fi){
    fi.addEventListener('change', async e=>{
      const f = e.target.files?.[0];
      if(!f) return;
      try{
        const text = await f.text();
        const data = JSON.parse(text);
        if(data && data.dump){
          Object.entries(data.dump).forEach(([k,v])=>{
            if(/^tp_/.test(k)) localStorage.setItem(k,v);
          });
        }
        setStatus('Restore complete. Reloading…');
        setTimeout(()=>location.reload(),600);
      }catch(err){
        console.error(err);
        setStatus('Restore failed.');
      }finally{
        e.target.value='';
      }
    });
  }

  function setStatus(m){
    const el = document.getElementById('tpBackupStatus');
    if(el) el.textContent = m;
  }
})();

function tpUpdateLastBackupLabel(){
  const el = document.getElementById('tpLastBackup');
  if(el){
    el.textContent = 'Last backup: ' + (localStorage.getItem('tp_last_backup') || 'none');
  }
}

/* ===== PREDICTIVE TASK NAMES ===== */
const SUGGEST_MAX = 10;

function tpCollectTaskStats(){
  const stats = new Map();
  for(const dk of Object.keys(days||{})){
    for(const t of (days[dk]||[])){
      const nm = (t.name||'').trim();
      if(!nm) continue;
      const key = nm.toLowerCase();
      const ts = new Date(t.createdAt || t.timeCompleted || new Date()).getTime();
      if(!stats.has(key)) stats.set(key,{name:nm,count:0,last:0});
      const s = stats.get(key);
      s.count++;
      s.last = Math.max(s.last, ts);
    }
  }
  return stats;
}

function tpRankedNames(stats){
  return Array.from(stats.values())
    .sort((a,b)=>(b.count-a.count)||(b.last-a.last))
    .map(v=>v.name);
}

function tpGetSuggestions(prefix){
  const ranked = tpRankedNames(tpCollectTaskStats());
  const p = (prefix||'').trim().toLowerCase();
  if(!p) return ranked.slice(0,SUGGEST_MAX);

  const pref = ranked.filter(n=>n.toLowerCase().startsWith(p));
  if(pref.length>=SUGGEST_MAX) return pref.slice(0,SUGGEST_MAX);

  const rest = ranked.filter(n=>!n.toLowerCase().startsWith(p) && n.toLowerCase().includes(p));
  return [...pref,...rest].slice(0,SUGGEST_MAX);
}

function tpRenderDatalist(prefix){
  const dl = document.getElementById('taskSuggestions');
  if(!dl) return;
  const opts = tpGetSuggestions(prefix);
  dl.innerHTML = opts.map(n=>`<option value="${escapeHtml(n)}"></option>`).join('');
}

/* ===== Sync Code Helpers ===== */
function ensureSyncCode(){
  let code = localStorage.getItem(LS_SYNC);
  if(!code){
    code = 'grp-'+randomCode(6);
    localStorage.setItem(LS_SYNC,code);
  }
  const inp = document.getElementById('syncCode');
  if(inp){
    inp.value = code;
    inp.placeholder = 'Enter sync code (grp-XXXXXX)';
  }
  if(isFirebaseReady()) attachSync(code);
}

function copySyncCode(){
  const inp=document.getElementById('syncCode');
  if(!inp) return;
  navigator.clipboard.writeText(inp.value||'').then(()=>alert('Copied.'));
}

function newSyncCode(){
  if(!confirm('Generate a new sync code? Other devices must use this new code.')) return;
  const code = 'grp-'+randomCode(6);
  localStorage.setItem(LS_SYNC,code);
  const inp=document.getElementById('syncCode');
  if(inp) inp.value = code;
  if(syncOff) syncOff();
  if(isFirebaseReady()) attachSync(code);
}

function saveSyncCode(){
  const inp=document.getElementById('syncCode');
  if(!inp) return;
  const v=(inp.value||'').trim();
  if(!v) return alert('Enter a valid sync code first.');
  localStorage.setItem(LS_SYNC,v);
  if(syncOff) syncOff();
  if(isFirebaseReady()) attachSync(v);
  alert('Sync code saved.');
}

function mergeDays(localDays,remoteDays){
  const out = {...(localDays||{})};
  for(const d of Object.keys(remoteDays||{})){
    if(!out[d]){
      out[d] = remoteDays[d];
      continue;
    }
    const L = out[d] || [];
    const R = remoteDays[d] || [];
    const stamp = arr => arr.reduce((m,t)=>Math.max(
      m,
      new Date(t.timeCompleted||t.createdAt||0).getTime()
    ),0);
    out[d] = stamp(R) > stamp(L) ? R : L;
  }
  return out;
}

function attachSync(code){
  if(!isFirebaseReady()){
    setSyncBadge('Local-only');
    return;
  }
  if(syncOff) syncOff();

  syncRef = firebase.database().ref(`taskpulse/${code}`);
  setSyncBadge(`Sync: ${code}`,'good');

  syncRef.child('days').get().then(snap=>{
    const remote = snap.val();
    if(remote && typeof remote==='object'){
      days = mergeDays(days,remote);
      save(LS_KEY,days);
      renderAll();
    }else{
      debouncedPush();
    }
  }).catch(e=>{
    console.warn(e);
    setSyncBadge('Sync error','warn');
  });

  const handler = syncRef.on('value', snap=>{
    const val = snap.val();
    if(!val || !val.days) return;
    if(val._meta && val._meta.by === TP_UID) return;
    days = mergeDays(days,val.days);
    save(LS_KEY,days);
    renderAll();
  });

  syncOff = ()=>syncRef.off('value',handler);
}

function debouncedPush(){
  if(!syncRef) return;
  clearTimeout(writeTimer);
  writeTimer = setTimeout(()=>{
    syncRef.set({
      days,
      _meta:{by:TP_UID,at:Date.now()}
    }).catch(console.warn);
  },250);
}

/* Override save so sync writes to cloud */
const _save = save;
save = function(k,v){
  _save(k,v);
  if(k===LS_KEY) debouncedPush();
};

/* ===== Service Worker ===== */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

/* ===== INIT ===== */
document.addEventListener('DOMContentLoaded', ()=>{
  // tabs
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>showTab(btn.dataset.tab));
  });

  const input = document.getElementById('taskInput');
  if(input){
    tpRenderDatalist('');
    input.addEventListener('input', ()=>tpRenderDatalist(input.value));
    input.addEventListener('focus', ()=>tpRenderDatalist(input.value));
  }

  const hs = document.getElementById('histSearch');
  const hsSpan = document.getElementById('histSpan');
  if(hs) hs.addEventListener('input', renderHistory);
  if(hsSpan) hsSpan.addEventListener('change', renderHistory);

  autoCarryForwardIfNewDay();
  tpUpdateLastBackupLabel();
  ensureSyncCode();
  renderAll();
  renderHistory();
  showCarryBannerIfAny();
});
</script>
