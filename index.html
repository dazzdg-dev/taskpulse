<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Task Pulse v6</title>
<link rel="icon" href="icon-192.png">
<style>
:root{
  --bg:#0f111a;--card:#141725;--ink:#e9ecf5;--line:#262a3c;
  --good:#76e0a6;--warn:#ffcc66;--bad:#ff8ea1;
}
body{margin:0;font-family:Inter,system-ui;background:var(--bg);color:var(--ink)}
.wrap{max-width:820px;margin:0 auto;padding:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin:10px 0}
button{border-radius:12px;border:1px solid var(--line);padding:10px 16px;background:#1b1f33;color:#e9ecf5;font-weight:600}
button.primary{background:#f1f3fb;color:#161b2d}
.badge{border:1px solid var(--line);border-radius:999px;padding:4px 10px}
.badge.good{background:#0b1f16;color:#76e0a6}
.tabs{display:flex;gap:8px;justify-content:center;margin:10px 0}
.tabs button.active{background:#f1f3fb;color:#161b2d}
.tabpage{display:none}.tabpage.active{display:block}
.remind{border:1px solid var(--warn);background:#3a300f;color:#ffd890;
       padding:8px 12px;border-radius:12px;margin:8px 0;display:none}
</style>
</head>
<body>
<div class="wrap">
  <h2>Task Pulse v6</h2>
  <div class="badge" id="syncState">Local-only</div>

  <div class="tabs">
    <button class="active" id="tabBtnTasks" onclick="showTab('tasks')">Tasks</button>
    <button id="tabBtnHistory" onclick="showTab('history')">History</button>
    <button id="tabBtnSettings" onclick="showTab('settings')">Settings</button>
  </div>

  <!-- ===== TASKS TAB ===== -->
  <div id="tab-tasks" class="tabpage active">
    <section class="card">
      <h3>Today's Tasks</h3>
      <input id="taskInput" type="text" placeholder="Add task …">
      <button class="primary" onclick="addTask()">Add</button>
      <ul id="taskList"></ul>
    </section>

    <!-- Medication logging -->
    <section class="card">
      <h3>Medication Log</h3>
      <div id="medRemind" class="remind"></div>
      <div style="display:flex;gap:10px">
        <button id="dayBtn" onclick="markMed('day')">Day Dose</button>
        <button id="nightBtn" onclick="markMed('night')">Night Dose</button>
      </div>
      <div style="margin-top:6px;font-size:14px">
        <div id="dayTime"></div>
        <div id="nightTime"></div>
      </div>
    </section>
  </div>

  <!-- ===== HISTORY ===== -->
  <div id="tab-history" class="tabpage">
    <section class="card">
      <h3>History</h3>
      <div id="histWrap"></div>
    </section>
  </div>

  <!-- ===== SETTINGS ===== -->
  <div id="tab-settings" class="tabpage">
    <section class="card">
      <h3>Sync</h3>
      <input id="syncCode" placeholder="grp-ABC123">
      <button onclick="copySync()">Copy</button>
      <button onclick="newSync()">New</button>
      <button onclick="saveSync()">Save</button>
    </section>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig={
  apiKey:"AIzaSyDXbxWT9viGCGDpPxlzp45QaBr3zUUn2UU",
  authDomain:"taskpulse-9a6ab.firebaseapp.com",
  databaseURL:"https://taskpulse-9a6ab-default-rtdb.firebaseio.com",
  projectId:"taskpulse-9a6ab",
  storageBucket:"taskpulse-9a6ab.firebasestorage.app",
  messagingSenderId:"92117591983",
  appId:"1:92117591983:web:dd1d73226dbb112c58f15a"
};
firebase.initializeApp(firebaseConfig);
</script>

<script>
/* ---------- Core & Tabs ---------- */
const LS_KEY='tp_days',LS_SYNC='tp_sync',LS_MED='tp_med';
let days=JSON.parse(localStorage.getItem(LS_KEY)||'{}');
function showTab(id){document.querySelectorAll('.tabpage').forEach(e=>e.classList.remove('active'));
 document.getElementById('tab-'+id).classList.add('active');
 document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
 document.getElementById('tabBtn'+id.charAt(0).toUpperCase()+id.slice(1)).classList.add('active');}

/* ---------- Tasks ---------- */
function addTask(){
 const t=document.getElementById('taskInput').value.trim();
 if(!t)return;
 const today=new Date().toISOString().slice(0,10);
 days[today]=days[today]||[];
 days[today].push({name:t,done:false});
 save();renderTasks();
 document.getElementById('taskInput').value='';
}
function renderTasks(){
 const today=new Date().toISOString().slice(0,10);
 const ul=document.getElementById('taskList');ul.innerHTML='';
 (days[today]||[]).forEach((x,i)=>{
  const li=document.createElement('li');
  li.innerHTML=`<label><input type="checkbox" ${x.done?'checked':''}
    onchange="toggleDone(${i})"> ${x.name}</label>`;
  ul.appendChild(li);
 });
}
function toggleDone(i){
 const today=new Date().toISOString().slice(0,10);
 days[today][i].done=!days[today][i].done;save();renderTasks();
}
function save(){localStorage.setItem(LS_KEY,JSON.stringify(days));}

/* ---------- Medication ---------- */
let meds=JSON.parse(localStorage.getItem(LS_MED)||'{}');
function markMed(type){
 const now=new Date();
 meds[type]={time:now.toLocaleTimeString(),iso:now.toISOString()};
 localStorage.setItem(LS_MED,JSON.stringify(meds));
 renderMed();setReminder();
}
function renderMed(){
 document.getElementById('dayTime').textContent=meds.day?`☀ Day dose taken at ${meds.day.time}`:'';
 document.getElementById('nightTime').textContent=meds.night?`🌙 Night dose taken at ${meds.night.time}`:'';
}
function setReminder(){
 const box=document.getElementById('medRemind');
 box.style.display='none';
 const now=new Date();
 if(meds.day&&!meds.night){
   const dayT=new Date(meds.day.iso);
   const diff=(now-dayT)/36e5;
   if(diff>=12){box.textContent='⚠ Night dose overdue (12 hrs after day dose)!';box.style.display='block';}
   else if(diff>=11.916){box.textContent='⏰ Night dose in 5 min';box.style.display='block';}
 }
}
setInterval(setReminder,60000);renderMed();

/* ---------- Sync (editable field) ---------- */
const SYNC_PREFIX='grp-';
function randomCode(l=6){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let r='';for(let i=0;i<l;i++)r+=c[Math.floor(Math.random()*c.length)];return r;}
function ensureSync(){let c=localStorage.getItem(LS_SYNC);if(!c){c=SYNC_PREFIX+randomCode();localStorage.setItem(LS_SYNC,c);}
 const i=document.getElementById('syncCode');i.value=c;i.removeAttribute('readonly');attachSync(c);}
function copySync(){navigator.clipboard.writeText(document.getElementById('syncCode').value);}
function newSync(){const c=SYNC_PREFIX+randomCode();localStorage.setItem(LS_SYNC,c);document.getElementById('syncCode').value=c;attachSync(c);}
function saveSync(){const v=document.getElementById('syncCode').value.trim();localStorage.setItem(LS_SYNC,v);attachSync(v);}
function attachSync(code){
 const ref=firebase.database().ref('taskpulse/'+code);
 document.getElementById('syncState').textContent='Sync: '+code;
 ref.on('value',s=>{const v=s.val();if(v&&v.days){days=v.days;save();renderTasks();}});
 window.addEventListener('storage',()=>{ref.set({days});});
}
ensureSync();renderTasks();
</script>
</body>
</html>
